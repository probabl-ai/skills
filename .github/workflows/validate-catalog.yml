name: Validate catalog

on:
  pull_request:
    paths:
      - "catalog.json"
      - "skills/**"
      - "tools/**"
      - ".claude-plugin/**"
      - ".cursor-plugin/**"
      - "pixi.toml"
      - "pixi.lock"
      - ".github/workflows/validate-catalog.yml"
  push:
    branches: [main]
    paths:
      - "catalog.json"
      - "skills/**"
      - "tools/**"
      - ".claude-plugin/**"
      - ".cursor-plugin/**"
      - "pixi.toml"
      - "pixi.lock"
      - ".github/workflows/validate-catalog.yml"

jobs:
  validate:
    name: Catalog hashes + structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11 # v0.9.6
        with:
          locked: true
          cache: true
          # Only write the cache from pushes to main, to keep the
          # repository's cache footprint below GitHub's 10 GB cap.
          cache-write: ${{ github.event_name == 'push' && github.ref_name == 'main' }}

      - name: Run all catalog checks
        run: pixi run check
